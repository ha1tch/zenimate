name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build GUI (cgo-free purego path)
        env:
          CGO_ENABLED: '0'
        run: go build -tags purego -o /dev/null ./cmd/zenimate-gui/

      - name: Vet
        run: go vet ./pkg/... ./internal/...

      - name: Test (core)
        run: go test ./pkg/... ./internal/... -count=1

      - name: Test (GUI, purego)
        env:
          CGO_ENABLED: '0'
        run: go test -tags purego ./cmd/zenimate-gui/ -count=1
